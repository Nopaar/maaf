<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f5f5;
}

.login-box{
  width:400px;
  background:#ffffff;
  padding:40px;
  border-radius:24px;
  box-shadow:
  0 10px 30px rgba(0,0,0,0.08),
  0 2px 10px rgba(0,0,0,0.03);
  border:1px solid #ececec;
}

.title{
  text-align:center;
  font-size:34px;
  font-weight:700;
  color:#111;
  margin-bottom:35px;
  letter-spacing:1px;
}

.input-group{
  margin-bottom:22px;
}

label{
  display:block;
  margin-bottom:8px;
  color:#333;
  font-size:14px;
  font-weight:600;
}

input{
  width:100%;
  height:54px;
  border:1px solid #dcdcdc;
  border-radius:14px;
  padding:0 16px;
  font-size:15px;
  background:#fafafa;
  transition:.25s;
}

input:focus{
  outline:none;
  border-color:#999;
  background:#fff;
  box-shadow:0 0 0 4px rgba(0,0,0,0.05);
}

button{
  width:100%;
  height:54px;
  border:none;
  border-radius:14px;
  background:#111111;
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:.25s;
  margin-top:5px;
}

button:hover{
  background:#222;
  transform:translateY(-1px);
}

button:active{
  transform:scale(.99);
}

#message{
  margin-top:18px;
  text-align:center;
  font-size:14px;
}

.success{
  color:#1a7f37;
  font-weight:600;
}

.error{
  color:#d93025;
  font-weight:600;
}

::placeholder{
  color:#999;
}

</style>

</head>
<body>

<div class="login-box">

  <div class="title">
    LOGIN
  </div>

  <div class="input-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Masukkan Email">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Masukkan Password">
  </div>

  <button onclick="login()">
    Masuk
  </button>

  <div id="message"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3mxe87NySKiK3DHy1Xgz9I-pfFmZQNOk",
  authDomain: "login-d5403.firebaseapp.com",
  projectId: "login-d5403",
  storageBucket: "login-d5403.firebasestorage.app",
  messagingSenderId: "1019154611121",
  appId: "1:1019154611121:web:4dca630e51d15ebc991b90",
  measurementId: "G-D9CNBW19L4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  const message =
  document.getElementById("message");

  signInWithEmailAndPassword(auth, email, password)

  .then((userCredential) => {

    message.innerHTML =
    "<div class='success'>Login Berhasil</div>";

    setTimeout(()=>{

      window.location.href = "login.html";

    },1000);

  })

  .catch((error) => {

    message.innerHTML =
    "<div class='error'>Email atau password salah</div>";

  });

}

</script>

</body>
</html>
