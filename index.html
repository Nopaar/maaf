<!-- login.html -->
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>????</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(90deg,#adadb8,#000000);
}

.login-box{
  width:400px;
  background:#fff;
  padding:35px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.title{
  text-align:center;
  font-size:32px;
  font-weight:bold;
  margin-bottom:30px;
}

.input-group{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:600;
}

input{
  width:100%;
  height:50px;
  border:1px solid #ddd;
  border-radius:10px;
  padding:0 15px;
  font-size:15px;
}

input:focus{
  outline:none;
  border-color:#4f4f53;
}

button{
  width:100%;
  height:52px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#5b5ce9,#4285f4);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.error{
  margin-top:15px;
  color:red;
  text-align:center;
  font-size:14px;
}

</style>
</head>
<body>

<div class="login-box">

  <div class="title">
    ?
  </div>

  <div class="input-group">
    <label>Ur Fucking Id</label>
    <input type="text" id="userid" placeholder="Masukkan ID">
  </div>

  <div class="input-group">
    <label>Ur Fucking Password</label>
    <input type="password" id="password" placeholder="Masukkan Password">
  </div>

  <button onclick="login()">
    ????
  </button>

  <div class="error" id="error"></div>

</div>

<script>

// ID & PASSWORD LOGIN

const USER_ID = "spakbor";
const USER_PASSWORD = "memek";

function login(){

  const userid = document.getElementById("userid").value;
  const password = document.getElementById("password").value;

  if(userid === USER_ID && password === USER_PASSWORD){

    // LOGIN BERHASIL
    window.location.href = "index.html";

  }else{

    // LOGIN GAGAL
    document.getElementById("error").innerHTML =
    "YAHAHAHA GABISA MASUK";

  }

}

</script>

</body>
</html>
